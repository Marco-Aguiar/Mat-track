spring:
  application:
    name: mattrack-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mattrack}
    username: ${SPRING_DATASOURCE_USERNAME:mattrack}
    password: ${SPRING_DATASOURCE_PASSWORD:mattrack}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  data:
  redis:
    url: ${REDIS_URL:redis://localhost:6379}
    timeout: 5s

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret-256bits}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://mattrack-ui.vercel.app}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:mattrack-secret-key-with-at-least-32-characters}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}