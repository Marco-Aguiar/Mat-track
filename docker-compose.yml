services:
  postgres:
    image: postgres:16-alpine
    container_name: mattrack-postgres
    environment:
      POSTGRES_DB: mattrack
      POSTGRES_USER: mattrack
      POSTGRES_PASSWORD: mattrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mattrack-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
